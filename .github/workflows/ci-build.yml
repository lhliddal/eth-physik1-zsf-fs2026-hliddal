name: CI Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install LaTeX toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            latexmk \
            texlive-latex-extra \
            texlive-fonts-extra \
            texlive-science \
            texlive-lang-german \
            chktex \
            poppler-utils

      - name: Run checks
        run: make check

      - name: Build PDF
        run: make build

      - name: Upload PDF artifact
        uses: actions/upload-artifact@v4
        with:
          name: physik1_fs2026_hliddal-pdf
          path: physik1_fs2026_hliddal.pdf
